name: Android

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/signing/release.jks"

      - name: Build signed release APK
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          ./gradlew assembleRelease \
            -PWIFIPORTAL_STORE_FILE="$RUNNER_TEMP/signing/release.jks" \
            -PWIFIPORTAL_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
            -PWIFIPORTAL_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -PWIFIPORTAL_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"

      - uses: actions/upload-artifact@v4
        with:
          name: wifiportal-apks
          path: app/build/outputs/apk/**/*.apk
