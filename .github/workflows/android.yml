name: Android

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/signing/release.jks"

      - name: Build signed release APK
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          ./gradlew assembleRelease \
            -PWIFIPORTAL_STORE_FILE="$RUNNER_TEMP/signing/release.jks" \
            -PWIFIPORTAL_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
            -PWIFIPORTAL_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -PWIFIPORTAL_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"

      - name: Upload signed APK to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') && env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          apk_name="wifiportal-${GITHUB_REF_NAME}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$apk_name"
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --title "WiFi Portal ${GITHUB_REF_NAME#v}" \
              --notes "Automated signed release for ${GITHUB_SHA}."
          gh release upload "$GITHUB_REF_NAME" "$apk_name" --clobber
